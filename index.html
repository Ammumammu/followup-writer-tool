<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FollowUp Writer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 600px;
            text-align: center;
        }
        h1, h2 {
            color: #ffffff;
        }
        p {
            color: #a1a1aa;
        }
        button {
            background-color: #6366f1;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
            margin-top: 20px;
        }
        button:hover {
            background-color: #4f46e5;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            margin-top: 20px;
        }
        input {
            background-color: #1e293b;
            color: #ffffff;
            border: 1px solid #4b5563;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
        }
        textarea {
            background-color: #1e293b;
            color: #ffffff;
            border: 1px solid #4b5563;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            height: 100px;
        }
        .viral-attribution {
            font-size: 12px;
            margin-top: 10px;
            color: #a1a1aa;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script type="text/babel">
        const CONFIG = {
            GROQ_KEY: 'CONFIG.GROQ_KEY',
            SUPABASE_ANON_KEY: 'your-supabase-anon-key',
            SUPABASE_URL: 'your-supabase-url'
        };

        const posthog = new PostHog('phc_placeholder', { api_host: 'https://app.posthog.com' });

        const useAI = async (prompt) => {
            const response = await fetch('https://api.groq.com/v1/engines/llama3-70b/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${CONFIG.GROQ_KEY}`
                },
                body: JSON.stringify({
                    prompt: prompt,
                    max_tokens: 150
                })
            });
            const data = await response.json();
            return data.choices[0].text.trim();
        };

        const captureLead = async (email) => {
            const supabaseUrl = CONFIG.SUPABASE_URL;
            const supabaseKey = CONFIG.SUPABASE_ANON_KEY;
            const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@latest');
            const supabase = createClient(supabaseUrl, supabaseKey);
            await supabase.from('leads').insert([{ email }]);
        };

        const FollowUpWriter = () => {
            const [view, setView] = React.useState('landing');
            const [freeUses, setFreeUses] = React.useState(2);
            const [emailTemplate, setEmailTemplate] = React.useState('');
            const [customizedEmail, setCustomizedEmail] = React.useState('');
            const [email, setEmail] = React.useState('');

            React.useEffect(() => {
                if (view === 'tool') {
                    posthog.capture('tool_opened');
                }
            }, [view]);

            const handleTemplateSelect = (template) => {
                setEmailTemplate(template);
                setView('tool');
            };

            const handleCustomizeEmail = async () => {
                const prompt = `Generate a follow-up email based on this template: ${emailTemplate}.`;
                const response = await useAI(prompt);
                setCustomizedEmail(response);
                posthog.capture('tool_used');
                setFreeUses(freeUses - 1);
                if (freeUses === 1) {
                    posthog.capture('free_limit_hit');
                }
            };

            const handlePaywall = () => {
                setView('paywall');
                posthog.capture('paywall_shown');
            };

            const handlePaymentClick = () => {
                window.location.href = 'https://buy.stripe.com/test_bJeeV67rsawK8TY5cvg7e0g';
                posthog.capture('payment_clicked');
            };

            const handleEmailCapture = async (e) => {
                e.preventDefault();
                await captureLead(email);
                setFreeUses(freeUses + 3);
                setEmail('');
                setView('tool');
                posthog.capture('email_captured');
            };

            return (
                <div className="container">
                    {view === 'landing' && (
                        <>
                            <h1>Leads Lost</h1>
                            <h2>Sales teams craft effective follow-ups in seconds</h2>
                            <p>Choose template (5 sec) → Customize with AI (10 sec) → Send converting email (instant)</p>
                            <button onClick={() => handleTemplateSelect('You have shown great interest in our product. Let’s schedule a call to discuss how it can benefit your business.')}>Send Winning Emails</button>
                        </>
                    )}
                    {view === 'tool' && (
                        <>
                            <h1>Customize Your Follow-Up</h1>
                            <textarea value={customizedEmail} readOnly></textarea>
                            <button onClick={handleCustomizeEmail} disabled={freeUses === 0}>Customize with AI</button>
                            {freeUses === 0 && <button onClick={handlePaywall}>Upgrade to Unlock More Uses</button>}
                            <div className="viral-attribution">Generated by FollowUp Writer — followup-writer-tool.vercel.app</div>
                        </>
                    )}
                    {view === 'paywall' && (
                        <>
                            <h1>Upgrade to FollowUp Writer</h1>
                            <p>Get unlimited follow-up emails for $9/mo</p>
                            <button onClick={handlePaymentClick}>Upgrade Now</button>
                            <form onSubmit={handleEmailCapture}>
                                <div className="form-group">
                                    <label htmlFor="email">Get 3 Free Uses by signing up:</label>
                                    <input type="email" id="email" value={email} onChange={(e) => setEmail(e.target.value)} required />
                                    <button type="submit">Sign Up</button>
                                </div>
                            </form>
                        </>
                    )}
                </div>
            );
        };

        ReactDOM.render(<FollowUpWriter />, document.getElementById('app'));
    </script>



<!-- LAUNCH BANNER — Injected by revenue-agent -->
<div id="launch-banner" style="position:fixed;bottom:0;left:0;right:0;z-index:9999;background:linear-gradient(90deg,#7c3aed,#2563eb);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 -4px 24px rgba(0,0,0,.3);font-family:Inter,sans-serif">
  <div>
    <span style="font-size:13px;opacity:.8">🚀 LAUNCH WEEK OFFER</span>
    <div style="font-size:17px;font-weight:700">Get FollowUp Writer for $19 <span style="text-decoration:line-through;opacity:.6;font-weight:400">$38</span> — lifetime access</div>
  </div>
  <div style="display:flex;gap:12px;align-items:center">
    <a href="https://buy.stripe.com/test_bJeeV67rsawK8TY5cvg7e0g" target="_blank"
       style="background:#fff;color:#7c3aed;padding:10px 22px;border-radius:8px;font-weight:800;font-size:15px;text-decoration:none;white-space:nowrap">
      Buy Now →
    </a>
    <button onclick="document.getElementById('launch-banner').style.display='none'" style="background:transparent;border:none;color:#fff;opacity:.6;cursor:pointer;font-size:20px;padding:0 4px">✕</button>
  </div>
</div>
<script>
  // Countdown timer — 24h from page load
  const TIMER_KEY = 'offer_end_' + 'followup-writer-tool';
  let endTime = localStorage.getItem(TIMER_KEY);
  if (!endTime) { endTime = Date.now() + 24 * 3600 * 1000; localStorage.setItem(TIMER_KEY, endTime); }
  const banner = document.getElementById('launch-banner');
  function updateTimer() {
    const left = Math.max(0, endTime - Date.now());
    const h = Math.floor(left / 3600000);
    const m = Math.floor((left % 3600000) / 60000);
    const s = Math.floor((left % 60000) / 1000);
    const el = document.getElementById('banner-timer');
    if (el) el.textContent = `Offer expires in ${h}h ${m}m ${s}s`;
    if (left === 0 && banner) banner.style.display = 'none';
  }
  setInterval(updateTimer, 1000);
  setTimeout(() => { banner.parentNode.insertBefore(Object.assign(document.createElement('div'), {id:'banner-timer',style:'font-size:11px;opacity:.7;margin-top:2px'}), banner.querySelector('div').nextSibling); }, 100);
</script>
</body>
</html>
