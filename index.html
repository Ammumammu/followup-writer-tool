<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FollowUp Writer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background-color: #1e293b;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1, h2 {
            color: #ffffff;
        }
        input, button {
            padding: 1rem;
            margin-top: 1rem;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
        }
        input {
            width: calc(100% - 2rem);
            background-color: #334155;
            color: #ffffff;
        }
        button {
            background-color: #6366f1;
            color: #ffffff;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #4f46e5;
        }
        .cta, .paywall-cta {
            margin-top: 2rem;
        }
        .viral-attribution {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 1rem;
        }
        .paywall {
            text-align: center;
        }
        .paywall h2 {
            margin-bottom: 0.5rem;
        }
        .paywall p {
            margin-bottom: 1rem;
        }
        .paywall a {
            color: #6366f1;
            text-decoration: none;
        }
        .paywall a:hover {
            text-decoration: underline;
        }
        .email-input {
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/posthog-js"></script>
    <script type="text/babel">
        const CONFIG = {
            GROQ_KEY: 'CONFIG.GROQ_KEY',
            SUPABASE_ANON_KEY: 'your-supabase-anon-key',
            SUPABASE_URL: 'https://your-supabase-url.supabase.co'
        };

        const posthog = new PostHog('your-posthog-token', { api_host: 'https://app.posthog.com' });

        const LeadCapture = ({ onCapture }) => {
            const [email, setEmail] = React.useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                onCapture(email);
                setEmail('');
            };

            return (
                <form onSubmit={handleSubmit}>
                    <input
                        type="email"
                        value={email}
                        onChange={(e) => setEmail(e.target.value)}
                        placeholder="Enter your email"
                        required
                    />
                    <button type="submit">Get 3 More Free Uses</button>
                </form>
            );
        };

        const Paywall = ({ onPaymentClick, onEmailCapture }) => {
            posthog.capture('paywall_shown');

            return (
                <div className="paywall">
                    <h2>Upgrade to Use More</h2>
                    <p>Get unlimited follow-up emails for just $9/mo.</p>
                    <div className="cta">
                        <button onClick={onPaymentClick}>
                            Upgrade Now
                        </button>
                    </div>
                    <div className="email-input">
                        <LeadCapture onCapture={onEmailCapture} />
                    </div>
                </div>
            );
        };

        const Tool = ({ onFreeLimitHit }) => {
            const [leadName, setLeadName] = React.useState('');
            const [lastEmail, setLastEmail] = React.useState('');
            const [suggestion, setSuggestion] = React.useState('');
            const [uses, setUses] = React.useState(0);
            const [showPaywall, setShowPaywall] = React.useState(false);

            const generateSuggestion = async () => {
                if (uses >= 2) {
                    setShowPaywall(true);
                    posthog.capture('free_limit_hit');
                    onFreeLimitHit();
                    return;
                }

                posthog.capture('tool_used');

                const response = await fetch('https://api.groq.com/v1/infer', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${CONFIG.GROQ_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'llama3-70b',
                        prompt: `Craft a follow-up email for ${leadName} regarding their last email: "${lastEmail}". The email should be professional and encourage a response.`
                    })
                });

                const data = await response.json();
                setSuggestion(data.result[0].text);
                setUses(uses + 1);
            };

            React.useEffect(() => {
                posthog.capture('tool_opened');
            }, []);

            return (
                <div>
                    <h1>FollowUp Writer</h1>
                    <p>Enter lead name and last email to get a suggested follow-up email.</p>
                    <input
                        type="text"
                        value={leadName}
                        onChange={(e) => setLeadName(e.target.value)}
                        placeholder="Lead Name"
                        required
                    />
                    <input
                        type="text"
                        value={lastEmail}
                        onChange={(e) => setLastEmail(e.target.value)}
                        placeholder="Last Email Content"
                        required
                    />
                    <button onClick={generateSuggestion}>Generate Suggestion</button>
                    {suggestion && (
                        <div>
                            <h2>Suggested Follow-Up Email:</h2>
                            <p>{suggestion}</p>
                            <p className="viral-attribution">Generated by FollowUp Writer — followup-writer-tool.vercel.app</p>
                        </div>
                    )}
                    {showPaywall && <Paywall onPaymentClick={() => window.location.href = 'https://buy.stripe.com/test_7sYdR25jk34i7PU0Wfg7e02'} onEmailCapture={() => setUses(0)} />}
                </div>
            );
        };

        const Landing = () => {
            return (
                <div>
                    <h1>Leads Not Responding? Get Instant Follow-Ups</h1>
                    <h2>Craft perfect follow-up emails in seconds, without writing a word</h2>
                    <p>Enter lead name and last email → Get suggested follow-up email → Send and track responses</p>
                    <div className="cta">
                        <button onClick={() => ReactDOM.render(<Tool onFreeLimitHit={() => setShowPaywall(true)} />, document.getElementById('root'))}>
                            Start Writing Perfect Follow-Ups Today
                        </button>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [showPaywall, setShowPaywall] = React.useState(false);

            return (
                <div className="container">
                    {!showPaywall ? <Landing /> : <Paywall onPaymentClick={() => window.location.href = 'https://buy.stripe.com/test_7sYdR25jk34i7PU0Wfg7e02'} onEmailCapture={() => setShowPaywall(false)} />}
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
